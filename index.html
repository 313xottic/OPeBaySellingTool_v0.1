<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCG Marketplace — eBay Seller Tools</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#060610;--bg2:#0c0c1e;--bg3:#101028;--bd:#1c1c3a;--bd2:#2a2a50;--tx:#e4e4f0;--dim:#6a6a88;--ac:#e84118;--ac2:#ff6348;--acG:rgba(232,65,24,.15);--grn:#22c55e;--ylw:#f59e0b}
*{margin:0;padding:0;box-sizing:border-box}html,body{height:100%;background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;font-size:14px}
button{font-family:inherit;cursor:pointer}input,select,textarea{font-family:inherit}a{color:var(--ac)}
code{font-family:'JetBrains Mono',monospace;font-size:12px;background:var(--bg3);padding:2px 6px;border-radius:4px}
.app{display:flex;flex-direction:column;min-height:100vh}
.hdr{display:flex;align-items:center;gap:14px;padding:14px 24px;border-bottom:1px solid var(--bd);background:rgba(6,6,16,.95);backdrop-filter:blur(16px);position:sticky;top:0;z-index:100}

.side-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:340;animation:fadeIn .2s ease}
.side-backdrop.open{display:block}
.hdr-logo{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#e84118,#c23616);font-size:22px;color:#fff;box-shadow:0 4px 20px rgba(232,65,24,.35);flex-shrink:0}
.hdr-t{font-weight:800;font-size:19px;letter-spacing:-.4px}.hdr-s{font-size:11px;color:var(--dim);letter-spacing:.3px}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:10px}

.ebay-btn:hover{border-color:var(--ac)}.ebay-btn.connected{background:rgba(34,197,94,.1);border-color:rgba(34,197,94,.3);color:var(--grn)}
.ebay-btn.expired{background:rgba(245,158,11,.1);border-color:rgba(245,158,11,.3);color:var(--ylw)}
.layout{display:flex;flex:1}.side{display:flex;flex-direction:column;gap:3px;padding:14px 10px;width:200px;min-width:200px;border-right:1px solid var(--bd);background:var(--bg2);position:sticky;top:71px;height:calc(100vh - 71px);overflow-y:auto;align-self:flex-start}
.side button{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:9px;border:1px solid transparent;background:transparent;color:var(--dim);font-weight:500;font-size:13.5px;text-align:left;transition:.15s;width:100%}
.side button:hover{background:rgba(255,255,255,.03)}.side button.on{background:var(--acG);border-color:rgba(232,65,24,.25);color:var(--ac);font-weight:700}

.inp{padding:10px 14px;border-radius:8px;border:1px solid var(--bd);background:var(--bg3);color:var(--tx);font-size:14px;outline:none;transition:.15s;width:100%}
.inp:focus{border-color:var(--ac)}.inp::placeholder{color:var(--dim)}.inp-big{font-size:17px;font-weight:600;padding:12px 16px}
.btn{padding:10px 22px;border-radius:8px;border:none;font-weight:700;font-size:14px;transition:.15s;display:inline-flex;align-items:center;gap:6px;text-decoration:none;white-space:nowrap}
.btn:disabled{opacity:.4;cursor:default}.btn-ac{background:var(--ac);color:#fff}.btn-ac:hover:not(:disabled){background:var(--ac2)}
.btn-grn{background:var(--grn);color:#fff}.btn-dng{background:#dc2626;color:#fff}
.btn-out{background:var(--bg2);color:var(--tx);border:1px solid var(--bd)}.btn-out:hover{border-color:var(--bd2)}
.btn-sm{padding:5px 14px;border-radius:6px;border:none;font-size:12px;font-weight:700;background:var(--ac);color:#fff;cursor:pointer}
.btn-back{margin-bottom:16px;padding:8px 16px;border-radius:8px;background:transparent;border:1px solid var(--bd);color:var(--dim);font-size:13px;cursor:pointer}
.btn-back:hover{border-color:var(--bd2);color:var(--tx)}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:stretch}.mb{margin-bottom:20px}
.card{background:var(--bg2);border-radius:12px;padding:20px;border:1px solid var(--bd);margin-bottom:16px}
.dim{color:var(--dim)}.hd{font-size:22px;font-weight:700;margin-bottom:20px}.hd3{font-size:15px;font-weight:700;margin-bottom:14px}

.badge-variant{background:rgba(147,51,234,.15);color:#c084fc;margin-left:6px}

.link-actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}

.modal-bg.lightbox{cursor:zoom-out}
.modal{background:var(--bg2);border:1px solid var(--bd);border-radius:14px;padding:24px;max-width:520px;width:100%;max-height:90vh;overflow-y:auto;cursor:default}
.modal-t{font-size:18px;font-weight:700;margin-bottom:16px}
.lightbox-img{max-width:90vw;max-height:85vh;border-radius:12px;box-shadow:0 12px 60px rgba(0,0,0,.8);cursor:default}
.img-btns{display:flex;gap:8px;margin-top:10px;justify-content:center}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@keyframes slideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
@keyframes spin{to{transform:rotate(360deg)}}.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:spin .6s linear infinite}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}

.dropdown{position:relative}
.dropdown-trigger{display:flex;align-items:center;justify-content:space-between;cursor:pointer;text-align:left;gap:8px}
.dropdown-trigger .dd-label{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--tx)}
.dropdown-trigger .dd-caret{color:var(--dim);font-size:10px;flex-shrink:0;transition:transform .15s}
.dropdown.open .dd-caret{transform:rotate(180deg)}
.dropdown-menu{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--bg2);border:1px solid var(--bd);border-radius:8px;padding:6px;z-index:50;box-shadow:0 12px 28px rgba(0,0,0,.5);max-height:320px;overflow-y:auto;min-width:180px}
.dropdown-menu[hidden]{display:none}
.dd-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:6px;cursor:pointer;font-size:14px;user-select:none;color:var(--tx)}
.dd-item:hover{background:var(--bg3)}
.dd-item input{accent-color:var(--ac);width:16px;height:16px;cursor:pointer;flex-shrink:0}
.dd-item.selected{background:var(--acG);color:var(--ac);font-weight:600}
.dd-sep{border:none;border-top:1px solid var(--bd);margin:4px 0}

.iw-fallback{width:100%;height:100%;background:#fff;color:#1a1a1a;display:flex;align-items:center;justify-content:center;text-align:center;padding:6px;font-size:10px;font-weight:700;line-height:1.3}
.det-img-fb{width:100%;aspect-ratio:.716;background:#fff;color:#1a1a1a;display:flex;align-items:center;justify-content:center;text-align:center;padding:20px;font-weight:700;font-size:15px;line-height:1.4;border-radius:12px;box-shadow:0 8px 40px rgba(0,0,0,.6)}

@media(max-width:800px){
  .hdr{position:sticky;top:0;z-index:400;padding:12px 14px;gap:10px}
  .menu-btn{display:inline-flex;position:relative;z-index:401}
  .layout{display:block}
  .side{position:fixed;top:63px;left:0;bottom:0;width:260px;max-width:82vw;height:calc(100vh - 63px)!important;max-height:none!important;padding:16px 10px!important;transform:translateX(-100%);transition:transform .25s ease;z-index:350;overflow-y:auto;border-right:1px solid var(--bd);border-bottom:none;align-self:auto;box-shadow:4px 0 24px rgba(0,0,0,.4)}
  .side.open{transform:translateX(0)}
  .side button{font-size:14px;padding:12px 14px;width:100%}
  .main{padding:16px}
  .det-grid{grid-template-columns:1fr!important}
  .det-iw{position:static;max-width:240px;margin:0 auto;width:100%}

  .ext-grid{grid-template-columns:1fr}
  .hdr-right .ebay-btn span + span{display:none}
  .live-grid{grid-template-columns:repeat(auto-fill,minmax(110px,1fr))}

  .inp-big{font-size:17px}
  .hd{font-size:19px}

}
@media(max-width:420px){
  .hdr-s{display:none}
  .st-grid{grid-template-columns:1fr}
  .st-vb{font-size:22px}
  .hdr-logo{width:36px;height:36px;font-size:18px;border-radius:10px}
  .hdr-t{font-size:16px}
}
</style>

<body>
<div class="app">
  <header class="hdr">
    <button class="menu-btn" id="menu-btn" aria-label="Open menu" onclick="toggleMenu()">☰</button>
    <div class="hdr-logo">⚓</div>
    <div><div class="hdr-t">TCG Marketplace</div><div class="hdr-s">One Piece · eBay Seller Tools</div></div>
    <div class="hdr-right"><button class="ebay-btn" id="ebay-btn" onclick="switchTab('ebay')"></button></div>
  </header>
  <div class="layout">
    <nav class="side" id="sidebar"></nav>
    <main class="main" id="main"></main>
  </div>
</div>
<div class="side-backdrop" id="side-backdrop" onclick="toggleMenu(false)"></div>
<div id="toast-container"></div>
<div id="modal-root"></div>

<script>
/* ═══ APP VERSION — bump to force cache invalidation on code updates ═══ */
var APP_VERSION = 'v20-cardtype-scrape-detail-sidebar-fixes-2026-04-19';

/* ═══ STATE ═══ */
var DB=null,LINKED_LISTINGS={},BOX_PRESETS=[],USER_ZIP='',EBAY_AUTH={accessToken:'',refreshToken:'',expiresAt:0,username:''},scrapeStatus='';

function loadStorage(){
  try{LINKED_LISTINGS=JSON.parse(localStorage.getItem('ll')||'{}');}catch(e){}
  try{BOX_PRESETS=JSON.parse(localStorage.getItem('bp')||'[]');}catch(e){}
  try{EBAY_AUTH=JSON.parse(localStorage.getItem('ea')||'{}');}catch(e){}
  if(!EBAY_AUTH.accessToken)EBAY_AUTH={accessToken:'',refreshToken:'',expiresAt:0,username:''};
  USER_ZIP=localStorage.getItem('uz')||'';
}
function saveStorage(){
  localStorage.setItem('ll',JSON.stringify(LINKED_LISTINGS));
  localStorage.setItem('bp',JSON.stringify(BOX_PRESETS));
  localStorage.setItem('ea',JSON.stringify(EBAY_AUTH));
  localStorage.setItem('uz',USER_ZIP);
}

/* ═══ INDEXEDDB WRAPPER — used for DB cache (bigger than localStorage quota) ═══ */
var IDB_NAME='tcg_cache',IDB_STORE='kv',IDB_VER=1;
function idbOpen(){
  return new Promise(function(res,rej){
    var req=indexedDB.open(IDB_NAME,IDB_VER);
    req.onupgradeneeded=function(e){var db=e.target.result;if(!db.objectStoreNames.contains(IDB_STORE))db.createObjectStore(IDB_STORE);};
    req.onsuccess=function(e){res(e.target.result);};
    req.onerror=function(e){rej(e.target.error);};
  });
}
function idbGet(key){
  return idbOpen().then(function(db){
    return new Promise(function(res,rej){
      var tx=db.transaction(IDB_STORE,'readonly');
      var req=tx.objectStore(IDB_STORE).get(key);
      req.onsuccess=function(){res(req.result);};
      req.onerror=function(){rej(req.error);};
    });
  });
}
function idbSet(key,val){
  return idbOpen().then(function(db){
    return new Promise(function(res,rej){
      var tx=db.transaction(IDB_STORE,'readwrite');
      tx.objectStore(IDB_STORE).put(val,key);
      tx.oncomplete=function(){res();};
      tx.onerror=function(){rej(tx.error);};
    });
  });
}

/* ═══ SCHEDULE — next 8:10 AM / 8:10 PM America/New_York ═══ */
function getNYOffsetMs(utcMs){
  var d=new Date(utcMs);
  var parts=new Intl.DateTimeFormat('en-US',{timeZone:'America/New_York',year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit',hourCycle:'h23'}).formatToParts(d);
  var f={};parts.forEach(function(p){if(p.type!=='literal')f[p.type]=+p.value;});
  return Date.UTC(f.year,f.month-1,f.day,f.hour,f.minute,f.second)-utcMs;
}
function nyWallclockToUTCms(y,m,d,h,mi){
  var guess=Date.UTC(y,m-1,d,h,mi,0);
  var off=getNYOffsetMs(guess);
  return guess-off;
}
function nextScheduledRefresh(fromMs){
  var parts=new Intl.DateTimeFormat('en-US',{timeZone:'America/New_York',year:'numeric',month:'2-digit',day:'2-digit'}).formatToParts(new Date(fromMs));
  var f={};parts.forEach(function(p){if(p.type!=='literal')f[p.type]=+p.value;});
  var best=Infinity;
  for(var delta=0;delta<=2;delta++){
    var ref=new Date(Date.UTC(f.year,f.month-1,f.day+delta));
    var y=ref.getUTCFullYear(),m=ref.getUTCMonth()+1,d=ref.getUTCDate();
    var hms=[[8,10],[20,10]];
    for(var i=0;i<hms.length;i++){
      var t=nyWallclockToUTCms(y,m,d,hms[i][0],hms[i][1]);
      if(t>fromMs&&t<best)best=t;
    }
  }
  return best;
}

/* ═══ DB CACHE SERIALIZE / LOAD ═══ */
var DB_CACHE_KEY='tcg_db_v2';
function serializeDB(db){
  return{
    version:APP_VERSION,
    savedAt:Date.now(),
    allCards:db.allCards,
    sealed:db.sealed,
    don:db.don
  };
}
function deserializeDB(s){
  var cardMap=new Map(),byUid=new Map();
  s.allCards.forEach(function(c){
    if(!cardMap.has(c.number))cardMap.set(c.number,[]);
    cardMap.get(c.number).push(c);
    byUid.set(c.uid,c);
  });
  s.sealed.forEach(function(p){byUid.set(p.uid,p);});
  s.don.forEach(function(p){byUid.set(p.uid,p);});
  return{cardMap:cardMap,byUid:byUid,sealed:s.sealed,don:s.don,allCards:s.allCards};
}
function loadCachedDB(){
  return idbGet(DB_CACHE_KEY).then(function(cached){
    if(!cached)return null;
    if(cached.version!==APP_VERSION){console.log('[cache] APP_VERSION changed, invalidating');return null;}
    var next=nextScheduledRefresh(cached.savedAt);
    if(Date.now()>next){console.log('[cache] past scheduled refresh, invalidating');return null;}
    console.log('[cache] hit — valid until '+new Date(next).toLocaleString());
    return deserializeDB(cached);
  }).catch(function(e){console.warn('[cache] load failed:',e);return null;});
}
function saveCachedDB(db){
  return idbSet(DB_CACHE_KEY,serializeDB(db)).then(function(){
    console.log('[cache] saved — next refresh '+new Date(nextScheduledRefresh(Date.now())).toLocaleString());
  }).catch(function(e){console.warn('[cache] save failed:',e);});
}

/* ═══ CALCULATOR ═══ */
function calcListing(net,cs){
  var D=1-0.1325-0.1325*0.1011,S=0.1325+0.1325*0.1011,b=cs!=null?cs:0.74;
  for(var i=0;i<10;i++){
    var aL=(net+0.3+S*b)/D,tot=aL+b+0.1011*(aL+b),a,c;
    if(tot>=10.01){c=0.4;a=(net+0.4+S*b)/D;}else{c=0.3;a=aL;}

/* ═══ CSV PARSER ═══ */
function parseCSV(text){
  var rows=[],row=[],field='',inQuotes=false;
  for(var i=0;i<text.length;i++){
    var ch=text[i],next=text[i+1];
    if(inQuotes){
      if(ch==='"'){if(next==='"'){field+='"';i++;}else{inQuotes=false;}}
      else{field+=ch;}
    }else{
      if(ch==='"')inQuotes=true;
      else if(ch===',')  {row.push(field);field='';}
      else if(ch==='\n'||ch==='\r'){
        if(ch==='\r'&&next==='\n')i++;
        row.push(field);
        if(row.length>0&&row.some(function(v){return v!=='';}))rows.push(row);
        row=[];field='';
      }else field+=ch;
    }
  }
  if(field||row.length){row.push(field);if(row.some(function(v){return v!=='';}))rows.push(row);}
  if(rows.length===0)return[];
  var headers=rows[0],result=[];
  for(var r=1;r<rows.length;r++){
    var obj={};headers.forEach(function(h,idx){obj[h.trim()]=(rows[r][idx]||'').trim();});
    result.push(obj);
  }
  return result;
}

function parseCardName(card){

  var bn=fn.trim(),numE=ext.find(function(e){return e.name==='Number';}),num=numE?numE.value.trim():(sfn||'');

async function fetchViaProxy(url){

// Returns a map { variantName: price, '_': fallbackPrice } and also attaches variant names where possible
async function scrapePricesForPid(pid){
  var result={};
  try{
    var apiUrl='https://mpapi.tcgplayer.com/v2/product/'+pid+'/pricepoints';
    var txt=await fetchViaProxy(apiUrl);
    if(txt){
      var data=JSON.parse(txt);
      if(Array.isArray(data)&&data.length>0){
        data.forEach(function(p){
          var pr=p.marketPrice||p.midPrice||p.lowPrice||p.directLowPrice||p.highPrice||0;
          if(pr>0)result[p.subTypeName||'_']=pr;
        });
        if(Object.keys(result).length)return result;
      }
    }
  }catch(e){}
  try{
    var htmlUrl='https://www.tcgplayer.com/product/'+pid+'?Language=English';
    var html=await fetchViaProxy(htmlUrl);
    if(html){
      var detectedVariant=detectVariantFromHtml(html);
      // Extract variant and price from near-mint table rows
      var rows=html.match(/<tr[^>]*data-testid="near-mint-data-row-\d+"[^>]*>[\s\S]*?<\/tr>/g);
      if(rows){
        rows.forEach(function(row){
          var varMatch=row.match(/<span[^>]*class="text"[^>]*>([^<]+):<\/span>/);
          var priceMatch=row.match(/<span[^>]*class="near-mint-table__price"[^>]*>\s*\$?([\d,]+\.\d{2})/);
          if(varMatch&&priceMatch){
            var variantName=varMatch[1].trim();
            var price=parseFloat(priceMatch[1].replace(/,/g,''));
            if(!isNaN(price)&&price>0)result[variantName]=price;
          }
        });
      }
      // Fallback if no rows found
      if(Object.keys(result).length===0){
        var m=html.match(/class="near-mint-table__price"[^>]*>\s*\$?([\d,]+\.\d{2})/);
        if(m){
          var fallbackPrice=parseFloat(m[1].replace(/,/g,''));
          if(detectedVariant)result[detectedVariant]=fallbackPrice;
          else result['_']=fallbackPrice;
        }
      } else if(detectedVariant && !result[detectedVariant]){
        var firstKey=Object.keys(result).find(function(k){return k!=='_';});
        if(firstKey&&result[firstKey]>0)result[detectedVariant]=result[firstKey];
      }
    }
  }catch(e){}
  return result;
}

async function scrapeMissingPrices(data,onP){
  var all=data.allCards.concat(data.sealed).concat(data.don);
  var missing=all.filter(function(p){return !p.marketPrice||p.marketPrice<=0;});
  if(!missing.length){onP('');return;}
  proxyFails=[0,0,0];
  var byPid={};
  missing.forEach(function(p){if(!byPid[p.productId])byPid[p.productId]=[];byPid[p.productId].push(p);});
  var pids=Object.keys(byPid),CONC=12,done=0,found=0,total=pids.length;
  onP('Scraping '+total+' missing products via TCGPlayer API...');
  console.log('[scrape] Starting scrape for '+total+' products ('+missing.length+' variants)');
  for(var i=0;i<pids.length;i+=CONC){
    var batch=pids.slice(i,i+CONC);
    await Promise.allSettled(batch.map(function(pid){
      return scrapePricesForPid(pid).then(function(prices){
        done++;
        if(prices){
          byPid[pid].forEach(function(p){
            // Determine best matching price: try exact variant name first, then fallback
            var pr=null;
            if(p.variant&&prices[p.variant])pr=prices[p.variant];
            else if(prices['Normal'])pr=prices['Normal'];
            else if(prices['Foil'])pr=prices['Foil'];
            else if(prices['_'])pr=prices['_'];
            else{
              for(var k in prices){if(prices[k]>0){pr=prices[k];break;}}
            }
            if(pr>0){
              p.marketPrice=pr;
              // If variant not set and we found a specific variant name, set it (only for cards/don)
              if(!p.variant&&(p.type==='card'||p.type==='don')){
                if(prices['Normal'])p.variant='Normal';
                else if(prices['Foil'])p.variant='Foil';
                else{
                  for(var k in prices){if(k!=='_'){p.variant=k;break;}}
                }
              }
              found++;
            }
          });
        }
      }).catch(function(){done++;});
    }));
    onP('Scraping prices: '+done+'/'+total+' ('+found+' recovered)');
    if(proxyFails[0]>=PROXY_DEAD_AT&&proxyFails[1]>=PROXY_DEAD_AT&&proxyFails[2]>=PROXY_DEAD_AT){
      console.warn('[scrape] All proxies dead, aborting. Fails:',proxyFails);
      onP('Scrape aborted — all proxies blocked.');
      break;
    }
  }
  console.log('[scrape] Done. Recovered '+found+'. Proxy fails:',proxyFails);
  onP('Price scrape complete: '+found+' variants recovered');
  setTimeout(function(){scrapeStatus='';var el=document.getElementById('sts-txt');if(el&&DB&&currentTab==='search'){el.textContent='One Piece DB loaded ('+DB.cardMap.size+' serials, '+(DB.sealed.length+DB.don.length)+' products)';}},4000);
}

/* ═══ DB LOADER — improved categorization using CardType extendedData ═══ */
var DNAMES={CardType:'Card Type',Subtypes:'Subtype(s)',Counterplus:'Counter+',CardEffect:'Effect',BlockIcon:'Block',FlavorText:'Flavor Text'};
var SERIAL_PATTERN=/\b((?:OP|ST|EB|P|PRB)\d{0,2}-\d{3,}[A-Z]?)\b/i;

async function loadDB(onP){
  var gTxt=await fetchP('https://tcgcsv.com/tcgplayer/68/Groups.csv');
  var gRows=parseCSV(gTxt);
  var sets=gRows.filter(function(r){return r.groupId&&r.name;}).map(function(r){return{id:parseInt(r.groupId),name:r.name};});
  onP('Found '+sets.length+' sets...');
  var cMap=new Map(),byUid=new Map(),sealed=[],don=[],allCards=[];
  for(var i=0;i<sets.length;i+=6){
    var batch=sets.slice(i,i+6);
    var results=await Promise.allSettled(batch.map(function(s){
      return fetchP('https://tcgcsv.com/tcgplayer/68/'+s.id+'/ProductsAndPrices.csv').then(function(t){return{t:t,sn:s.name};});
    }));
    results.forEach(function(res){
      if(res.status!=='fulfilled')return;
      var rows=parseCSV(res.value.t);
      var counts={};
      rows.forEach(function(r){if(!r.name||!r.name.trim())return;var pid=parseInt(r.productId)||0;counts[pid]=(counts[pid]||0)+1;});
      rows.forEach(function(row){
        if(!row.name||!row.name.trim())return;

        var mp=parseFloat(row.marketPrice)||0;
        if(mp<=0)mp=parseFloat(row.midPrice)||0;
        if(mp<=0)mp=parseFloat(row.lowPrice)||0;
        if(mp<=0)mp=parseFloat(row.directLowPrice)||0;
        if(mp<=0)mp=parseFloat(row.highPrice)||0;

        var ext=[];
        for(var ck in row){
          if(ck.indexOf('ext')===0&&ck.length>3&&row[ck]&&row[ck].trim()){
            var fn=ck.substring(3);
            ext.push({name:fn,displayName:DNAMES[fn]||fn.replace(/([A-Z])/g,' $1').trim(),value:row[ck].trim()});
          }
        }

        var pid=parseInt(row.productId)||0;
        var subType=(row.subTypeName||'').trim();
        var splitVariants=counts[pid]>1&&subType;
        var variant=subType||null;
        var uid=splitVariants?(pid+'_'+subType):String(pid);

        var nm=row.name.trim();
        var serial=row.extNumber&&row.extNumber.trim()?row.extNumber.trim():'';
        if(!serial){var nE=ext.find(function(e){return e.name==='Number';});if(nE)serial=nE.value.trim();}
        if(!serial){var sm=nm.match(SERIAL_PATTERN);if(sm)serial=sm[1];}

        var cardTypeVal=getCardTypeValue(ext);
        var hasCardType=hasCardTypeField(ext);
        var isDonByCardType=hasCardType&&cardTypeVal==='DON!!';
        var isCharacterOrLeader=hasCardType&&(cardTypeVal==='CHARACTER'||cardTypeVal==='LEADER');
        var detectedType=isDonByCardType?'don':(isCharacterOrLeader?'card':'sealed');
        if(detectedType==='sealed')variant=null;

        if(serial||detectedType==='card'){
          var num=serial?serial.toUpperCase():('NO-SERIAL-'+pid);
          var rE=ext.find(function(e){return e.name==='Rarity';});
          var card={productId:pid,uid:uid,variant:variant,name:nm,
            rarity:row.extRarity||(rE?rE.value:'')||'',
            number:num,marketPrice:mp,extendedData:ext,setName:res.value.sn,type:'card'};
          if(!cMap.has(num))cMap.set(num,[]);
          cMap.get(num).push(card);byUid.set(uid,card);allCards.push(card);
        } else if(detectedType==='don'){
          var dp={productId:pid,uid:uid,variant:variant,name:nm,marketPrice:mp,setName:res.value.sn,extendedData:ext,type:'don'};
          don.push(dp);byUid.set(uid,dp);
        } else {
          var sp={productId:pid,uid:uid,variant:null,name:nm,marketPrice:mp,setName:res.value.sn,extendedData:ext,type:'sealed'};
          sealed.push(sp);byUid.set(uid,sp);
        }
      });
    });
    onP('Loaded '+Math.min(i+6,sets.length)+'/'+sets.length+' sets ('+cMap.size+' serials, '+sealed.length+' sealed, '+don.length+' DON!!)');
  }
  return{cardMap:cMap,byUid:byUid,sealed:sealed,don:don,allCards:allCards};
}

function toggleMenu(open){
  var sb=$('sidebar'),bd=$('side-backdrop'),mb=$('menu-btn');
  if(!sb||!bd)return;
  if(open===undefined)open=!sb.classList.contains('open');
  if(open){sb.classList.add('open');bd.classList.add('open');document.body.classList.add('drawer-open');if(mb)mb.setAttribute('aria-label','Close menu');}
  else{sb.classList.remove('open');bd.classList.remove('open');document.body.classList.remove('drawer-open');if(mb)mb.setAttribute('aria-label','Open menu');}
}

/* ═══ SEARCH TAB ═══ */
var searchQ='',searchStatus='idle',searchSel=null,searchCustShip='';
var searchFilter={cards:true,don:true,sealed:true};
var searchVariant={cards:'all',don:'all'};
var searchSort='best'; // 'best', 'high-low', 'low-high'

function imgFail(img){if(!img||!img.parentNode)return;img.parentNode.innerHTML='<div class="iw-fallback">Image Currently Unavailable</div>';}
function detImgFail(){
  var img=$('det-img');
  if(img&&img.parentNode){var fb=document.createElement('div');fb.className='det-img-fb';fb.textContent='Image Currently Unavailable';img.parentNode.replaceChild(fb,img);}
  var btns=$('img-btns');if(btns)btns.style.display='none';
}

function filterLabel(){
  var f=searchFilter,all=f.cards&&f.don&&f.sealed,none=!f.cards&&!f.don&&!f.sealed;
  if(all)return'All Types';
  if(none)return'None';
  var parts=[];if(f.cards)parts.push('Cards');if(f.don)parts.push('DON!!');if(f.sealed)parts.push('Sealed');
  return parts.join(', ');
}
function updateFilterLabel(){var lbl=document.querySelector('#filter-trigger .dd-label');if(lbl)lbl.textContent=filterLabel();}
function variantLabelFor(type){var val=searchVariant[type]||'all';return val==='all'?'All Variants':val==='normal'?'Normal':'Foil';}
function updateVariantLabel(type){var lbl=document.querySelector('#variant-trigger-'+type+' .dd-label');if(lbl)lbl.textContent=variantLabelFor(type);}
function sortLabel(){return searchSort==='best'?'Best Match':searchSort==='high-low'?'Price: High → Low':'Price: Low → High';}
function updateSortLabel(){var lbl=document.querySelector('#sort-trigger .dd-label');if(lbl)lbl.textContent=sortLabel();}

function renderSearch(m){
  var stColor=searchStatus==='ready'?'#22c55e':searchStatus.indexOf('Error')>=0?'#ef4444':'#eab308';
  var baseText=searchStatus==='ready'?'One Piece DB loaded ('+DB.cardMap.size+' serials, '+(DB.sealed.length+DB.don.length)+' products)':searchStatus;
  var stText=baseText+(searchStatus==='ready'&&scrapeStatus?' · '+scrapeStatus:'');
  var html='<div class="sts"><span class="dot" style="background:'+stColor+'"></span><span id="sts-txt">'+esc(stText)+'</span></div>';

  if(!searchSel){
    html+='<input class="inp inp-big" id="sq" placeholder="Type a serial (e.g. OP05-) or name..." autocomplete="off" value="'+esc(searchQ)+'" style="margin-bottom:14px">';
    var f=searchFilter,allChecked=f.cards&&f.don&&f.sealed;
    html+='<div class="row mb">';
    // Filter — custom dropdown, multi-select
    html+='<div class="field dropdown" id="filter-dd"><label>Filter</label>';
    html+='<button class="inp dropdown-trigger" id="filter-trigger" type="button"><span class="dd-label">'+esc(filterLabel())+'</span><span class="dd-caret">▼</span></button>';
    html+='<div class="dropdown-menu" id="filter-menu" hidden>';
    html+='<label class="dd-item"><input type="checkbox" data-fk="all"'+(allChecked?' checked':'')+'> <span>All</span></label>';
    html+='<hr class="dd-sep">';
    html+='<label class="dd-item"><input type="checkbox" data-fk="cards"'+(f.cards?' checked':'')+'> <span>Cards</span></label>';
    html+='<label class="dd-item"><input type="checkbox" data-fk="don"'+(f.don?' checked':'')+'> <span>DON!!</span></label>';
    html+='<label class="dd-item"><input type="checkbox" data-fk="sealed"'+(f.sealed?' checked':'')+'> <span>Sealed</span></label>';
    html+='</div></div>';
    if(f.cards){
      html+='<div class="field dropdown" id="variant-dd-cards"><label>Cards Variant</label>';
      html+='<button class="inp dropdown-trigger" id="variant-trigger-cards" type="button"><span class="dd-label">'+esc(variantLabelFor('cards'))+'</span><span class="dd-caret">▼</span></button>';
      html+='<div class="dropdown-menu" id="variant-menu-cards" hidden>';
      html+='<div class="dd-item'+(searchVariant.cards==='all'?' selected':'')+'" data-vv="all" data-vtype="cards">All Variants</div>';
      html+='<div class="dd-item'+(searchVariant.cards==='normal'?' selected':'')+'" data-vv="normal" data-vtype="cards">Normal</div>';
      html+='<div class="dd-item'+(searchVariant.cards==='foil'?' selected':'')+'" data-vv="foil" data-vtype="cards">Foil</div>';
      html+='</div></div>';
    }
    if(f.don){
      html+='<div class="field dropdown" id="variant-dd-don"><label>DON!! Variant</label>';
      html+='<button class="inp dropdown-trigger" id="variant-trigger-don" type="button"><span class="dd-label">'+esc(variantLabelFor('don'))+'</span><span class="dd-caret">▼</span></button>';
      html+='<div class="dropdown-menu" id="variant-menu-don" hidden>';
      html+='<div class="dd-item'+(searchVariant.don==='all'?' selected':'')+'" data-vv="all" data-vtype="don">All Variants</div>';
      html+='<div class="dd-item'+(searchVariant.don==='normal'?' selected':'')+'" data-vv="normal" data-vtype="don">Normal</div>';
      html+='<div class="dd-item'+(searchVariant.don==='foil'?' selected':'')+'" data-vv="foil" data-vtype="don">Foil</div>';
      html+='</div></div>';
    }
    // Sort — custom dropdown, single-select (best match added)
    html+='<div class="field dropdown" id="sort-dd"><label>Sort</label>';
    html+='<button class="inp dropdown-trigger" id="sort-trigger" type="button"><span class="dd-label">'+esc(sortLabel())+'</span><span class="dd-caret">▼</span></button>';
    html+='<div class="dropdown-menu" id="sort-menu" hidden>';
    html+='<div class="dd-item'+(searchSort==='best'?' selected':'')+'" data-sv="best">Best Match</div>';
    html+='<div class="dd-item'+(searchSort==='high-low'?' selected':'')+'" data-sv="high-low">Price: High → Low</div>';
    html+='<div class="dd-item'+(searchSort==='low-high'?' selected':'')+'" data-sv="low-high">Price: Low → High</div>';
    html+='</div></div>';
    html+='</div>';
  }
  html+='<div id="search-content"></div>';
  m.innerHTML=html;

  if(!searchSel){
    var sqEl=$('sq');
    var debUp=debounce(function(){searchQ=sqEl.value;renderLiveGrid();},120);
    sqEl.oninput=function(){searchQ=this.value;debUp();};
    sqEl.onkeydown=function(e){if(e.key==='Escape'){this.value='';searchQ='';renderLiveGrid();}};
    sqEl.focus();

    // Filter dropdown wiring
    var fTrig=$('filter-trigger'),fMenu=$('filter-menu'),fDD=$('filter-dd');
    fTrig.onclick=function(e){e.stopPropagation();closeAllDropdownsExcept('filter-dd');var opening=fMenu.hidden;fMenu.hidden=!fMenu.hidden;fDD.classList.toggle('open',opening);};
    fMenu.onclick=function(e){e.stopPropagation();};
    fMenu.querySelectorAll('input[type=checkbox]').forEach(function(cb){
      cb.onchange=function(){
        var key=this.getAttribute('data-fk');
        if(key==='all'){
          searchFilter.cards=searchFilter.don=searchFilter.sealed=this.checked;
          ['cards','don','sealed'].forEach(function(k){var c=fMenu.querySelector('input[data-fk="'+k+'"]');if(c)c.checked=searchFilter[k];});
        }else{
          searchFilter[key]=this.checked;
          var allCb=fMenu.querySelector('input[data-fk="all"]');
          if(allCb)allCb.checked=searchFilter.cards&&searchFilter.don&&searchFilter.sealed;
        }
        updateFilterLabel();
        // Re-render whole search to show/hide variant filter
        renderSearch($('main'));
      };
    });

    ['cards','don'].forEach(function(vType){
      if($('variant-dd-'+vType)){
        var vTrig=$('variant-trigger-'+vType),vMenu=$('variant-menu-'+vType),vDD=$('variant-dd-'+vType);
        vTrig.onclick=function(e){e.stopPropagation();closeAllDropdownsExcept('variant-dd-'+vType);var opening=vMenu.hidden;vMenu.hidden=!vMenu.hidden;vDD.classList.toggle('open',opening);};
        vMenu.querySelectorAll('[data-vv]').forEach(function(it){
          it.onclick=function(e){
            e.stopPropagation();
            searchVariant[vType]=this.getAttribute('data-vv');
            vMenu.querySelectorAll('[data-vv]').forEach(function(x){x.classList.toggle('selected',x.getAttribute('data-vv')===searchVariant[vType]);});
            updateVariantLabel(vType);
            vMenu.hidden=true;vDD.classList.remove('open');
            renderLiveGrid();
          };
        });
      }
    });

    // Sort dropdown wiring
    var sTrig=$('sort-trigger'),sMenu=$('sort-menu'),sDD=$('sort-dd');
    sTrig.onclick=function(e){e.stopPropagation();closeAllDropdownsExcept('sort-dd');var opening=sMenu.hidden;sMenu.hidden=!sMenu.hidden;sDD.classList.toggle('open',opening);};
    sMenu.querySelectorAll('[data-sv]').forEach(function(it){
      it.onclick=function(e){
        e.stopPropagation();
        searchSort=this.getAttribute('data-sv');
        sMenu.querySelectorAll('[data-sv]').forEach(function(x){x.classList.toggle('selected',x.getAttribute('data-sv')===searchSort);});
        updateSortLabel();
        sMenu.hidden=true;sDD.classList.remove('open');
        renderLiveGrid();
      };
    });

    if(!window._closeDropdowns){
      window._closeDropdowns=function(e){
        ['filter-dd','variant-dd-cards','variant-dd-don','sort-dd'].forEach(function(ddId){
          var dd=$(ddId);
          var menuId=ddId.replace('variant-dd-','variant-menu-').replace('-dd','-menu');
          var menu=$(menuId);
          if(menu&&!menu.hidden&&dd&&!dd.contains(e.target)){menu.hidden=true;dd.classList.remove('open');}
        });
      };
      document.addEventListener('click',window._closeDropdowns);
    }
  }

  if(searchSel)renderDetail($('search-content'));
  else renderLiveGrid();
}

function closeAllDropdownsExcept(keepId){
  ['filter-dd','variant-dd-cards','variant-dd-don','sort-dd'].forEach(function(id){
    if(id===keepId)return;
    var dd=$(id),menu=$(id.replace('-dd','-menu'));
    if(menu&&!menu.hidden){menu.hidden=true;if(dd)dd.classList.remove('open');}
  });
}

function renderLiveGrid(){
  var el=$('search-content');if(!el)return;
  if(!DB||searchStatus!=='ready'){el.innerHTML='<div class="empty"><span class="spinner"></span> Loading database...</div>';return;}

  if(!searchFilter.cards&&!searchFilter.don&&!searchFilter.sealed){
    el.innerHTML='<div class="empty">No types selected — choose at least one in the filter above.</div>';return;
  }

  var q=searchQ.trim().toUpperCase(),qL=q.toLowerCase();
  var cardMatches=[],sealedM=[],donM=[];

  if(searchFilter.cards){
    if(!q){cardMatches=DB.allCards.slice();}
    else{
      var seenUids={};
      DB.cardMap.forEach(function(cards,key){if(key.indexOf(q)===0)cards.forEach(function(c){if(!seenUids[c.uid]){seenUids[c.uid]=1;cardMatches.push(c);}});});
      if(cardMatches.length===0)DB.cardMap.forEach(function(cards,key){if(key.indexOf(q)>=0)cards.forEach(function(c){if(!seenUids[c.uid]){seenUids[c.uid]=1;cardMatches.push(c);}});});
      if(cardMatches.length<200)for(var i=0;i<DB.allCards.length&&cardMatches.length<200;i++){var c=DB.allCards[i];if(!seenUids[c.uid]&&c.name.toLowerCase().indexOf(qL)>=0){seenUids[c.uid]=1;cardMatches.push(c);}}
    }
  }
  if(searchFilter.don)donM=q?DB.don.filter(function(p){return p.name.toLowerCase().indexOf(qL)>=0;}):DB.don.slice();
  if(searchFilter.sealed)sealedM=q?DB.sealed.filter(function(p){return p.name.toLowerCase().indexOf(qL)>=0;}):DB.sealed.slice();

  if(searchVariant.cards!=='all'){
    cardMatches=cardMatches.filter(function(c){
      var v=(c.variant||'').toLowerCase();
      if(searchVariant.cards==='normal')return variantMatchesFilter(c.variant,'normal');
      if(searchVariant.cards==='foil')return variantMatchesFilter(c.variant,'foil');
      return true;
    });
  }
  if(searchVariant.don!=='all'){
    donM=donM.filter(function(p){
      var v=(p.variant||'').toLowerCase();
      if(searchVariant.don==='normal')return variantMatchesFilter(p.variant,'normal');
      if(searchVariant.don==='foil')return variantMatchesFilter(p.variant,'foil');
      return true;
    });
  }

  // Sort based on selection
  function priceSort(a,b){
    var ap=a.marketPrice>0?a.marketPrice:null,bp=b.marketPrice>0?b.marketPrice:null;
    if(ap===null&&bp===null)return 0;
    if(ap===null)return 1;
    if(bp===null)return -1;
    return searchSort==='low-high'?ap-bp:bp-ap;
  }
  function bestMatchScore(item){
    if(!q)return 0;
    var name=item.name.toLowerCase();
    var number=(item.number||'').toLowerCase();
    if(number===qL)return 100;
    if(number.startsWith(qL))return 80;
    if(name===qL)return 70;
    if(name.startsWith(qL))return 60;
    if(name.includes(qL))return 30;
    return 0;
  }
  if(searchSort==='best'){
    cardMatches.sort(function(a,b){return bestMatchScore(b)-bestMatchScore(a);});
    donM.sort(function(a,b){return bestMatchScore(b)-bestMatchScore(a);});
    sealedM.sort(function(a,b){return bestMatchScore(b)-bestMatchScore(a);});
  } else {
    cardMatches.sort(priceSort);donM.sort(priceSort);sealedM.sort(priceSort);
  }

  var moreCards=cardMatches.length>80;cardMatches=cardMatches.slice(0,80);
  var moreDon=donM.length>24;donM=donM.slice(0,24);
  var moreSealed=sealedM.length>24;sealedM=sealedM.slice(0,24);

  var total=cardMatches.length+sealedM.length+donM.length;
  if(total===0){el.innerHTML='<div class="empty">No results'+(q?' for "'+esc(searchQ)+'"':'')+'</div>';return;}

  function priceCell(p){return p.marketPrice>0?'$'+p.marketPrice.toFixed(2):'<span class="dim">N/A</span>';}
  function variantCell(p){
    if(p.type==='sealed'||!p.variant)return'<span class="var"></span>';
    var isFoil=isFoilVariantName(p.variant);
    return'<span class="var'+(isFoil?' foil':'')+'">'+esc(p.variant)+'</span>';
  }
  function imgTag(pid){return'<img src="'+tcgImg(pid)+'" onerror="imgFail(this)" loading="lazy">';}

  var html='';
  if(cardMatches.length>0){
    html+='<div class="live-sec">🃏 Cards ('+cardMatches.length+(moreCards?'+':'')+')</div><div class="live-grid">';
    cardMatches.forEach(function(c){
      html+='<div class="live-card" data-uid="'+esc(c.uid)+'"><div class="iw">'+imgTag(c.productId)+'</div>';
      html+='<div class="n" title="'+esc(c.name)+'">'+esc(c.name)+'</div>';
      html+='<div class="s">'+esc(c.number)+'</div>';
      html+='<div class="pv">'+variantCell(c)+'<span class="p">'+priceCell(c)+'</span></div></div>';
    });
    html+='</div>';
  }
  if(donM.length>0){
    html+='<div class="live-sec">🃏 DON!! ('+donM.length+(moreDon?'+':'')+')</div><div class="live-grid">';
    donM.forEach(function(p){
      html+='<div class="live-card" data-uid="'+esc(p.uid)+'"><div class="iw">'+imgTag(p.productId)+'</div>';
      html+='<div class="n">'+esc(p.name)+'</div>';
      html+='<div class="s">'+esc(p.setName)+'</div>';
      html+='<div class="pv">'+variantCell(p)+'<span class="p">'+priceCell(p)+'</span></div></div>';
    });
    html+='</div>';
  }
  if(sealedM.length>0){
    html+='<div class="live-sec">📦 Sealed ('+sealedM.length+(moreSealed?'+':'')+')</div><div class="live-grid">';
    sealedM.forEach(function(p){
      html+='<div class="live-card" data-uid="'+esc(p.uid)+'"><div class="iw">'+imgTag(p.productId)+'</div>';
      html+='<div class="n">'+esc(p.name)+'</div>';
      html+='<div class="s">'+esc(p.setName)+'</div>';
      html+='<div class="pv"><span class="var"></span><span class="p">'+priceCell(p)+'</span></div></div>';
    });
    html+='</div>';
  }
  el.innerHTML=html;
  el.querySelectorAll('[data-uid]').forEach(function(card){
    card.onclick=function(){var p=getByUid(this.getAttribute('data-uid'));if(p){searchSel=p;searchCustShip='';renderSearch($('main'));window.scrollTo({top:0,behavior:'smooth'});}};
  });
}

/* ═══ DETAIL VIEW — restructured, HTML rendering for description ═══ */
function renderDetail(el){
  var s=searchSel;if(!s)return;
  var mp=s.marketPrice;
  var shipN=searchCustShip!==''&&!isNaN(parseFloat(searchCustShip))?parseFloat(searchCustShip):null;
  var calc=mp>0?calcListing(mp,shipN):null,vn=calc?vNet(calc.lp,calc.ship,calc.c):0;
  var linked=LINKED_LISTINGS[s.uid]||[];
  var imgSrc=tcgImg(s.productId);
  var aT,aB;
  if(s.type==='card'){aT=autoTitle(s);aB=autoBodyCard(s,aT);}
  else if(s.type==='don'){aT=s.name+' One Piece CCG';aB=autoBodyDon(s,aT);}
  else{aT=s.name+' One Piece CCG (SEALED)';aB=autoBodySealed(s,aT);}
  var aP=calc?calc.lp.toFixed(2):'—';

  var html='<div style="animation:fadeIn .2s ease">';
  html+='<button class="btn-back" id="det-back">← Back to Search Results</button>';
  html+='<div class="det-grid"><div class="det-iw">';
  html+='<img src="'+imgSrc+'" class="det-img" id="det-img" onerror="detImgFail()">';
  html+='<div class="img-btns" id="img-btns"><button class="btn btn-out" style="padding:8px 18px;font-size:13px" id="img-save">💾 Save Image</button></div>';
  html+='</div><div>';

  var tb=s.type==='card'?'<span class="badge badge-card">CARD</span>':s.type==='don'?'<span class="badge badge-don">DON!!</span>':'<span class="badge badge-sealed">SEALED</span>';
  var vb=(s.type!=='sealed'&&s.variant)?'<span class="badge badge-variant">'+esc(s.variant)+'</span>':'';
  html+='<div class="det-t">'+tb+' '+esc(s.name)+vb+'</div>';
  html+='<div class="det-m">';
  if(s.type==='card')html+='Serial: '+esc(s.number)+' · Rarity: '+esc(s.rarity)+' · ';
  if(s.type!=='sealed'&&s.variant)html+='Variant: '+esc(s.variant)+' · ';
  html+='Set: '+esc(s.setName)+'</div>';

  // 1. Market Price
  html+='<div class="card"><div class="hd3">📈 Market Price</div><div class="st-grid">';
  html+=stat('Market Price',mp>0?'$'+mp.toFixed(2):'N/A','',true);
  if(s.type!=='sealed'&&s.variant)html+=stat('Variant',s.variant);
  html+='</div></div>';

  // 2. Details (render HTML for fields)
  var ext=s.extendedData||[];
  if(ext.length>0){
    html+='<div class="card"><div class="hd3">📋 Details</div><div class="ext-grid">';
    ext.filter(function(e){return e.name!=='Description';}).forEach(function(e){
      html+='<div><span class="dim">'+(e.displayName||e.name)+':</span> <b>'+esc(e.value)+'</b></div>';
    });
    html+='</div>';
    var dE=ext.find(function(e){return e.name==='Description';});
    if(dE)html+='<div class="desc-t">'+sanitizeDetailHtml(dE.value)+'</div>';
    html+='</div>';
  }

  // 3. List At Price Breakdown
  html+='<div class="card" id="listat-card"><div class="hd3">💰 List At Price Breakdown</div>';
  html+='<div id="listat-stats">'+buildListAtStats(calc,vn)+'</div>';
  html+='<div style="margin-top:12px;display:flex;gap:8px;align-items:center;flex-wrap:wrap"><span class="dim">Custom shipping $:</span><input class="inp" style="width:90px;flex:0 0 auto" id="det-ship" placeholder="auto" value="'+esc(searchCustShip)+'"></div>';
  html+='</div>';

  // 4. Auto List Format
  html+='<div class="card"><div class="hd3">📝 Auto List Format</div>';
  var fields=[{label:'Title',value:aT,id:'alf-title'},{label:'Listing Price',value:aP,id:'alf-price'},{label:'Body (HTML)',value:aB,id:'alf-body'}];
  fields.forEach(function(f,i){
    html+='<div style="margin-bottom:12px" data-alf-row="'+i+'"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px"><span style="font-size:12px;font-weight:700">'+f.label+'</span><button class="btn-sm" data-cp="'+i+'">Copy</button></div><div class="code-blk" id="'+f.id+'" data-cp="'+i+'">'+esc(f.value)+'</div></div>';
  });
  html+='</div>';

  // 5. Linked Listings
  html+='<div class="card"><div class="hd3">🔗 Linked Listings '+(linked.length>0?'('+linked.length+')':'')+'</div>';

  html+='<div class="field" style="margin-bottom:12px"><label>Username</label><input class="inp" id="ea-u" value="'+esc(EBAY_AUTH.username)+'"></div>';
  html+='<div style="display:flex;gap:10px;justify-content:flex-end"><button class="btn btn-out" id="ea-cancel">Cancel</button><button class="btn btn-ac" id="ea-save">Save</button></div>';
  openModal(html);$('ea-cancel').onclick=closeModal;
  $('ea-save').onclick=function(){var t=$('ea-t').value.trim();if(!t){showToast('Token required',false);return;}EBAY_AUTH={accessToken:t,refreshToken:$('ea-r').value.trim(),expiresAt:Date.now()+(parseInt($('ea-e').value)||7200)*1000,username:$('ea-u').value.trim()};saveStorage();renderEbayBtn();closeModal();renderEbay($('main'));showToast('Saved!',true);};
}

/* ═══ SETTINGS / INFO ═══ */
function renderSettings(m){
  var next=nextScheduledRefresh(Date.now());
  var nextStr=new Date(next).toLocaleString('en-US',{timeZone:'America/New_York',weekday:'short',month:'short',day:'numeric',hour:'numeric',minute:'2-digit',timeZoneName:'short'});
  m.innerHTML='<div class="hd">⚙️ Settings</div>'
    +'<div class="card"><div class="hd3">📍 Ship-From ZIP</div><div class="row"><input class="inp" id="s-zip" style="max-width:200px" value="'+esc(USER_ZIP)+'"><button class="btn btn-ac" id="s-zs">Save</button></div></div>'
    +'<div class="card"><div class="hd3">🔄 Database Cache</div><div class="dim" style="font-size:13px;line-height:1.8">Version: <b>'+esc(APP_VERSION)+'</b><br>Next scheduled refresh: <b>'+esc(nextStr)+'</b><br><span style="font-size:12px">(schedule: 8:10 AM &amp; 8:10 PM America/New_York)</span></div><div class="row" style="margin-top:10px"><button class="btn btn-out" id="s-refresh">Force Refresh Now</button></div></div>'
    +'<div class="card"><div class="hd3">🗑️ Data</div><div class="row"><button class="btn btn-out" id="s-cl">Clear Linked</button><button class="btn btn-out" id="s-cp">Clear Presets</button><button class="btn btn-dng" id="s-ca">Clear All</button></div></div>'
    +'<div class="card"><div class="hd3">📊 Stats</div><div class="dim" style="font-size:13px;line-height:1.8">Linked: '+Object.keys(LINKED_LISTINGS).length+' products ('+Object.keys(LINKED_LISTINGS).reduce(function(a,k){return a+LINKED_LISTINGS[k].length;},0)+' listings)<br>Presets: '+BOX_PRESETS.length+'<br>eBay: '+(EBAY_AUTH.accessToken?(EBAY_AUTH.expiresAt>Date.now()?'connected':'expired'):'not signed in')+'</div></div>';
  $('s-zs').onclick=function(){var z=$('s-zip').value.trim();if(!/^\d{5}$/.test(z)){showToast('Invalid ZIP',false);return;}USER_ZIP=z;saveStorage();showToast('ZIP: '+z,true);};
  $('s-refresh').onclick=function(){if(!confirm('Force refresh database from TCGCSV now? This may take a minute.'))return;idbSet(DB_CACHE_KEY,null).then(function(){location.reload();});};
  $('s-cl').onclick=function(){if(!confirm('Clear linked?'))return;LINKED_LISTINGS={};saveStorage();showToast('Cleared',true);renderSettings(m);};
  $('s-cp').onclick=function(){if(!confirm('Clear presets?'))return;BOX_PRESETS=[];saveStorage();showToast('Cleared',true);renderSettings(m);};
  $('s-ca').onclick=function(){if(!confirm('Clear EVERYTHING?'))return;LINKED_LISTINGS={};BOX_PRESETS=[];USER_ZIP='';EBAY_AUTH={accessToken:'',refreshToken:'',expiresAt:0,username:''};localStorage.clear();idbSet(DB_CACHE_KEY,null);showToast('All cleared',true);renderEbayBtn();renderSettings(m);};
}
function renderInfo(m){
  var items=[{i:'💰',t:'eBay FVF',d:'13.25% of item + 13.25% × 10.11% of shipping',d2:'≈14.59% effective rate'},{i:'💳',t:'Fixed Fee',d:'$0.30 if total ≤ $10',d2:'$0.40 if total ≥ $10.01'},{i:'📦',t:'Shipping',d:'≤ $20 → $0.74',d2:'> $20 → $5.89'},{i:'🔢',t:'Formula',d:'a = (n + c + (0.1325 + 0.1325×0.1011) × b) / (1 − 0.1325 − 0.1325×0.1011)',d2:'a=listing b=ship n=net c=fee',mono:1}];
  var html='<div class="hd">📋 Fee Info</div><div style="display:grid;gap:14px">';
  items.forEach(function(it){html+='<div class="card"><div style="font-size:16px;font-weight:700;margin-bottom:6px">'+it.i+' '+it.t+'</div><div class="dim" style="line-height:1.7">'+it.d+'</div><div class="dim" style="opacity:.65;margin-top:4px;font-size:12px'+(it.mono?';font-family:JetBrains Mono,monospace':'')+'">'+it.d2+'</div></div>';});
  html+='</div>';m.innerHTML=html;
}

/* ═══ INIT ═══ */
async function initDB(){
  searchStatus='Checking cache...';
  if(currentTab==='search'){var el=$('sts-txt');if(el)el.textContent=searchStatus;}

  var cached=await loadCachedDB();
  if(cached){
    DB=cached;searchStatus='ready';
    migrateLinkedListings();
    if(currentTab==='search')renderSearch($('main'));
    scrapeMissingPrices(cached,function(msg){
      scrapeStatus=msg;
      if(currentTab==='search'){var el=$('sts-txt');if(el){var base='One Piece DB loaded ('+DB.cardMap.size+' serials, '+(DB.sealed.length+DB.don.length)+' products)';el.textContent=base+(msg?' · '+msg:'');}}
    }).then(function(){
      if(currentTab==='search'){if(searchSel){var fresh=getByUid(searchSel.uid);if(fresh)searchSel=fresh;}renderSearch($('main'));}
      saveCachedDB(DB);
    });
    return;
  }

  searchStatus='Loading...';
  if(currentTab==='search'){var el=$('sts-txt');if(el)el.textContent=searchStatus;}
  loadDB(function(msg){searchStatus=msg;if(currentTab==='search'){var el=$('sts-txt');if(el)el.textContent=msg;}}).then(function(data){
    DB=data;searchStatus='ready';
    migrateLinkedListings();
    if(currentTab==='search')renderSearch($('main'));
    saveCachedDB(DB);
    scrapeMissingPrices(data,function(msg){
      scrapeStatus=msg;
      if(currentTab==='search'){var el=$('sts-txt');if(el){var base='One Piece DB loaded ('+DB.cardMap.size+' serials, '+(DB.sealed.length+DB.don.length)+' products)';el.textContent=base+(msg?' · '+msg:'');}}
    }).then(function(){
      if(currentTab==='search'){if(searchSel){var fresh=getByUid(searchSel.uid);if(fresh)searchSel=fresh;}renderSearch($('main'));}
      saveCachedDB(DB);
    });
  }).catch(function(e){searchStatus='Error: '+e.message;if(currentTab==='search')renderSearch($('main'));});
}
window.onload=function(){loadStorage();initSidebar();renderEbayBtn();renderSearch($('main'));initDB();};
</script>
